<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test</title>
</head>
<body>
<h2>Firestore テスト</h2>
<button onclick="load()">データ取得</button>

<div id="result"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB9YnYdeF9s1BTlcMsgY7rB2TuZ2yqcoCU",
authDomain: "phrase-book-pj.firebaseapp.com",
projectId: "phrase-book-pj"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.load = async function () {
const resultArea = document.getElementById("result");
resultArea.innerHTML = "読み込み中...";

const snapshot = await getDocs(collection(db, "Phrase"));

let html = "";

snapshot.forEach(doc => {
　const data = doc.data();
　 console.log(data); // ← ★これを追加　06/09
  
html += `
<div style="margin-bottom: 30px; border-bottom: 1px solid #ccc;">
<p><b>Phr.jp：</b> ${data.phr?.jp ?? data["Phr.jp"]}</p>
<p><b>Phr.en：</b> ${data.phr?.en ?? data["Phr.en"]}</p>
<p><b>sit.place：</b> ${data.sit?.place ?? data["sit.place"]}</p>
<p><b>sit.who：</b> ${data.sit?.who ?? data["sit.who"]}</p>
<p><b>kw.arr：</b> ${data.kw?.arr ?? data["kw.arr"]}</p>
</div>
`;
});

resultArea.innerHTML = html;
};
</script>
