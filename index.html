<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Firestore テスト</title>
</head>
<body>

<h2>Firestore テスト</h2>
<button onclick="load()">データ取得</button>

<div id="result"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ★①ここだけ変更
const firebaseConfig = {
  apiKey: "AIzaSyB9YnYdeF9s1BTlcMsgY7rB2TuZ2yqcoCU",
  authDomain: "phrase-book-pj.firebaseapp.com",
  projectId: "phrase-book-pj"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ボタン押下
window.load = async function () {

  const output = document.getElementById("result");

  // ★②ここだけ変更
  const querySnapshot = await getDocs(collection(db, "phrase"));

  let html = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const phr_en = data.phr_en || "（なし）";
    const phr_jp = data.phr_jp || "（なし）";
    const sit_place = data.sit_place || "（なし）";
    const sit_who = data.sit_who || "（なし）";

    const kw_arr = Array.isArray(data.kw_arr)
      ? data.kw_arr.join(" / ")
      : "（なし）";

    html += `
      <div>
        <p>Phr.en: ${phr_en}</p>
        <p>Phr.jp: ${phr_jp}</p>
        <p>Sit.place: ${sit_place}</p>
        <p>Sit.who: ${sit_who}</p>
        <p>Kw.arr: ${kw_arr}</p>
      </div>
      <hr>
    `;
  });

  output.innerHTML = html;
};
</script>

</body>
</html>
